<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Раскрой металла</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #222222;
  --border: #2e2e2e;
  --text: #f0f0f0;
  --muted: #666;
  --accent: #e8c547;
  --accent-dim: rgba(232,197,71,0.12);
  --danger: #ff4d4d;
  --danger-dim: rgba(255,77,77,0.12);
  --success: #4caf7d;
  --radius: 12px;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
body.light {
  --bg: #f5f3ee; --surface: #ffffff; --surface2: #f0ede6;
  --border: #ddd9d0; --text: #1a1a1a; --muted: #999;
  --accent: #c49a00; --accent-dim: rgba(196,154,0,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; width: 100%; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; }

header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 14px 16px; display: flex; align-items: center;
  justify-content: space-between; backdrop-filter: blur(12px);
}
.header-title { display: flex; align-items: baseline; gap: 8px; flex-wrap: nowrap; min-width: 0; }
.header-title h1 { font-family: var(--mono); font-size: 15px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; white-space: nowrap; }
.header-badge { font-family: var(--mono); font-size: 10px; color: var(--accent); border: 1px solid var(--accent); padding: 1px 6px; border-radius: 4px; letter-spacing: 0.06em; white-space: nowrap; flex-shrink: 0; }
.theme-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; width: 36px; height: 36px; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.theme-btn:active { transform: scale(0.92); }

.container { padding: 12px 12px 40px; }

.section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
.section-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--surface2); }
.section-title { font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.section-body { padding: 12px 14px; }

.data-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
.data-table th { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 6px 4px; text-align: center; border-bottom: 1px solid var(--border); }
.data-table td { padding: 5px 4px; text-align: center; border-bottom: 1px solid var(--border); font-size: 14px; }
.data-table tr:last-child td { border-bottom: none; }

.num-input { width: 100%; padding: 9px 6px; font-family: var(--mono); font-weight: 600; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); text-align: center; transition: border-color 0.2s, box-shadow 0.2s; -webkit-appearance: none; font-size: 16px; height: 44px; box-sizing: border-box; }
.num-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }

.btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 12px; font-size: 14px; font-family: var(--sans); font-weight: 600; border-radius: 10px; border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s; letter-spacing: 0.02em; background: var(--accent); color: #111; }
.btn:active { transform: scale(0.97); opacity: 0.85; }
.btn-sm { padding: 7px 12px; font-size: 13px; width: auto; border-radius: 8px; }
.btn-run { font-size: 15px; padding: 14px; border-radius: 12px; }

.icon-btn { background: var(--danger-dim); border: none; border-radius: 6px; padding: 5px 8px; color: var(--danger); font-size: 13px; cursor: pointer; }
.icon-btn:active { opacity: 0.7; }

.add-form { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; align-items: stretch; }
.add-form > div { display: flex; flex-direction: column; }
.field-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; display: block; height: 16px; line-height: 16px; margin-bottom: 4px; text-align: center; }

.result-table { width: 100%; border-collapse: collapse; font-size: 13px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.result-table th { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 10px 8px; background: var(--surface2); text-align: center; border-bottom: 1px solid var(--border); }
.result-table td { padding: 10px 8px; text-align: center; border-bottom: 1px solid var(--border); vertical-align: middle; line-height: 1.5; }
.result-table tr:last-child td { border-bottom: none; }
.result-table tr:nth-child(even) td { background: var(--surface2); }
.sheet-label { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--accent); }
.cuts-text { font-family: var(--mono); font-size: 12px; }
.rest-text { font-family: var(--mono); font-size: 12px; color: var(--muted); }

.summary { margin-top: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
.summary-title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.summary-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.summary-row:last-child { border-bottom: none; }
.summary-key { font-family: var(--mono); font-weight: 600; }
.summary-val { font-family: var(--mono); color: var(--success); }
.summary-err { font-family: var(--mono); color: var(--danger); font-size: 12px; }
.error-msg { padding: 12px; background: var(--danger-dim); border: 1px solid rgba(255,77,77,0.3); border-radius: 8px; color: var(--danger); font-size: 13px; font-family: var(--mono); text-align: center; }

.modal-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 600px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border);
}
.modal-title { font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
.modal-close { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; font-size: 16px; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; }
.modal-body { padding: 16px 18px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 12px 18px 24px; border-top: 1px solid var(--border); }

.cnc-program { font-family: var(--mono); font-size: 14px; line-height: 2; }
.cnc-line { display: flex; align-items: center; gap: 10px; padding: 3px 0; border-bottom: 1px solid var(--border); }
.cnc-line:last-child { border-bottom: none; }
.cnc-num { font-size: 10px; color: var(--muted); min-width: 20px; text-align: right; }
.cnc-cmd { font-weight: 600; }
.cnc-stopper .cnc-cmd { color: #60a5fa; }
.cnc-cutting .cnc-cmd { color: var(--danger); }
.cnc-move .cnc-cmd { color: #a78bfa; }
.cnc-chain .cnc-cmd { color: var(--accent); }
.cnc-end .cnc-cmd { color: var(--success); }
.cnc-comment { font-size: 11px; color: var(--muted); margin-left: auto; }

.btn-prog {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 11px;
  font-family: var(--mono);
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: border-color 0.2s, color 0.2s;
  width: auto;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.btn-prog:hover { border-color: var(--accent); color: var(--accent); }
.btn-prog:active { opacity: 0.7; }

.btn-clear {
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 12px;
  font-family: var(--mono);
  padding: 4px 8px;
  border-radius: 6px;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: color 0.2s;
}
.btn-clear:hover { color: var(--danger); }

.toggle-zavalt {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 10px 14px; margin-bottom: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; cursor: pointer; font-family: var(--sans);
  font-size: 14px; font-weight: 500; color: var(--muted);
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}
.toggle-zavalt.active {
  border-color: var(--accent); color: var(--accent);
  background: var(--accent-dim);
}
.toggle-zavalt-icon { font-size: 18px; line-height: 1; transition: all 0.2s; }

/* ТАБЫ */
.tabs {
  display: flex; gap: 0; padding: 0 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg); overflow-x: auto;
}
.tab-btn {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase;
  padding: 10px 14px; border-radius: 0;
  border: none; border-bottom: 2px solid transparent;
  background: transparent; color: var(--muted); cursor: pointer;
  transition: color 0.2s, border-color 0.2s; white-space: nowrap;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-beta {
  font-size: 8px; font-weight: 700; letter-spacing: 0.08em;
  color: var(--accent); border: 1px solid var(--accent);
  padding: 1px 4px; border-radius: 3px; margin-left: 5px;
  vertical-align: middle; opacity: 0.8;
}
.tab-page { display: none; }
.tab-page.active { display: block; }

/* ИСТОРИЯ */
.history-modal {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
  align-items: flex-end; justify-content: center;
}
.history-modal.open { display: flex; }
.history-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px 20px 0 0; width: 100%; max-width: 600px;
  max-height: 75vh; display: flex; flex-direction: column;
  animation: slideUp 0.25s ease;
}
.history-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px 12px; border-bottom: 1px solid var(--border);
}
.history-title { font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
.history-body { padding: 12px 18px; overflow-y: auto; flex: 1; }
.history-item {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 10px;
  cursor: pointer; transition: border-color 0.2s;
}
.history-item:hover { border-color: var(--accent); }
.history-item:last-child { margin-bottom: 0; }
.history-item-date { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 6px; }
.history-item-sheets { font-family: var(--mono); font-size: 12px; color: var(--accent); margin-bottom: 4px; }
.history-item-details { font-family: var(--mono); font-size: 12px; color: var(--text); line-height: 1.6; }
.history-item-del { float: right; background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 0 0 0 8px; line-height: 1; }
.history-item-del:hover { color: var(--danger); }
.history-empty { font-family: var(--mono); font-size: 13px; color: var(--muted); text-align: center; padding: 24px 0; }
</style>

</head>
<body>

<header>
  <div class="header-title">
    <h1>MetalCut</h1>
    <span class="header-badge">v4</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <button class="btn-clear" onclick="openHistory()">история</button>
    <button class="btn-clear" onclick="clearAll()">очистить</button>
    <button class="theme-btn" id="themeToggle">☀️</button>
  </div>
</header>

<!-- ТАБЫ -->

<div class="tabs">
  <button class="tab-btn active" id="tab-main" onclick="switchTab('main')">Раскрой</button>
  <div style="flex:1"></div>
  <button class="tab-btn" id="tab-beta" onclick="switchTab('beta')" style="opacity:0;pointer-events:auto;min-width:60px">&nbsp;</button>
</div>

<!-- СТРАНИЦА: РАСКРОЙ -->

<div class="tab-page active" id="page-main">
<div class="container">

  <!-- ЛИСТЫ -->

  <div class="section">
    <div class="section-header">
      <span class="section-title">📋 Листы</span>
      <button class="btn btn-sm" onclick="exportSheets()">Экспорт</button>
    </div>
    <div class="section-body">
      <div class="add-form">
        <div>
          <label class="field-label">Ширина</label>
          <input class="num-input" autocomplete="off" id="sheetWidthInput" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="1250" value="1250">
        </div>
        <div>
          <label class="field-label">Длина</label>
          <input class="num-input" autocomplete="off" id="sheetLengthInput" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="">
        </div>
        <div>
          <label class="field-label">Кол-во</label>
          <input class="num-input" autocomplete="off" id="sheetCountInput" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="" value="">
        </div>
      </div>
      <button class="btn" onclick="addSheet()">+ Добавить лист</button>
      <table class="data-table" id="sheetsTable" style="margin-top:12px">
        <tr><th>Ширина</th><th>Длина</th><th>Кол-во</th><th></th></tr>
      </table>
    </div>
  </div>

  <!-- ДЕТАЛИ -->

  <div class="section">
    <div class="section-header">
      <span class="section-title">🔩 Детали</span>
      <button class="btn btn-sm" onclick="exportDetails()">Экспорт</button>
    </div>
    <div class="section-body">
      <div class="add-form">
        <div>
          <label class="field-label">Ширина</label>
          <input class="num-input" autocomplete="off" id="detailWidthInput" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="">
        </div>
        <div>
          <label class="field-label">Длина</label>
          <input class="num-input" autocomplete="off" id="detailLengthInput" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="">
        </div>
        <div>
          <label class="field-label">Кол-во</label>
          <input class="num-input" autocomplete="off" id="detailCountInput" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="">
        </div>
      </div>
      <button class="toggle-zavalt" id="zavaltToggle" onclick="toggleZavalt()">
        <span class="toggle-zavalt-icon" id="zavaltIcon">○</span>
        <span>Завальцовка</span>
      </button>
      <button class="btn" onclick="addDetailRow()">+ Добавить деталь</button>
      <table class="data-table" id="detailsTable" style="margin-top:12px">
        <tr><th>Ширина</th><th>Длина</th><th>Кол-во</th><th>Завальц.</th><th></th></tr>
      </table>
    </div>
  </div>

  <!-- РАСКРОЙ -->

  <div class="section">
    <div class="section-header">
      <span class="section-title">⚡ Раскрой</span>
      <button class="btn btn-sm" onclick="exportCutting()">Экспорт</button>
    </div>
    <div class="section-body">
      <button class="btn btn-run" onclick="calculateCutting()">▶ Выполнить раскрой</button>
      <div id="cuttingResult" style="margin-top:14px"></div>
    </div>
  </div>

</div><!-- /container -->
</div><!-- /page-main -->

<!-- СТРАНИЦА: РАСЧЁТ ЛИСТОВ BETA -->

<div class="tab-page" id="page-beta">
<div class="container">

  <div class="section">
    <div class="section-header">
      <span class="section-title">🔩 Детали</span>
    </div>
    <div class="section-body">
      <div class="add-form">
        <div>
          <label class="field-label">Ширина</label>
          <input class="num-input" autocomplete="off" id="betaWidthInput" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="">
        </div>
        <div>
          <label class="field-label">Длина</label>
          <input class="num-input" autocomplete="off" id="betaLengthInput" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="">
        </div>
        <div>
          <label class="field-label">Кол-во</label>
          <input class="num-input" autocomplete="off" id="betaCountInput" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="">
        </div>
      </div>
      <button class="btn" onclick="addBetaDetail()">+ Добавить деталь</button>
      <table class="data-table" id="betaDetailsTable" style="margin-top:12px">
        <tr><th>Ширина</th><th>Длина</th><th>Кол-во</th><th></th></tr>
      </table>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-title">📋 Параметры листа</span>
    </div>
    <div class="section-body">
      <div class="add-form">
        <div>
          <label class="field-label">Ширина листа</label>
          <input class="num-input" autocomplete="off" id="betaSheetWidth" type="number" inputmode="numeric" pattern="[0-9]*" value="1250">
        </div>
        <div><label class="field-label" style="color:var(--muted);font-size:11px">Длина подбирается автоматически</label></div>
        <div></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-body">
      <button class="btn btn-run" onclick="calculateBeta()">▶ Рассчитать листы</button>
      <div id="betaResult" style="margin-top:14px"></div>
    </div>
  </div>

</div>
</div><!-- /page-beta -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Программа ЧПУ</span>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="cnc-program" id="cncProgram"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="copyCncProgram()">Копировать программу</button>
    </div>
  </div>
</div>

<script>
  // ===== ТАБЫ =====
  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    document.getElementById('page-' + name).classList.add('active');
  }

  // ===== BETA: ДЕТАЛИ =====
  function addBetaDetail() {
    const w = parseInt(document.getElementById('betaWidthInput').value) || 0;
    const l = parseInt(document.getElementById('betaLengthInput').value) || 0;
    const c = parseInt(document.getElementById('betaCountInput').value) || 1;
    if (w <= 0 || l <= 0) return;
    const table = document.getElementById('betaDetailsTable');
    const row = table.insertRow();
    [w, l, c].forEach(v => { row.insertCell().textContent = v; });
    const td = row.insertCell();
    const btn = document.createElement('button');
    btn.textContent = '✕'; btn.className = 'icon-btn';
    btn.onclick = () => table.deleteRow(row.rowIndex);
    td.appendChild(btn);
    document.getElementById('betaWidthInput').value = '';
    document.getElementById('betaLengthInput').value = '';
    document.getElementById('betaCountInput').value = '';
    document.getElementById('betaWidthInput').focus();
  }

  // ===== BETA: РАСЧЁТ =====
  function calculateBeta() {
    const SW = parseInt(document.getElementById('betaSheetWidth').value) || 1250;
    const el = document.getElementById('betaResult');

    const table = document.getElementById('betaDetailsTable');
    const details = [];
    for (let i = 1; i < table.rows.length; i++) {
      const r = table.rows[i];
      const w = parseInt(r.cells[0].textContent) || 0;
      const l = parseInt(r.cells[1].textContent) || 0;
      const c = parseInt(r.cells[2].textContent) || 0;
      if (w > 0 && l > 0 && c > 0) details.push({ w, l, c });
    }
    if (!details.length) { el.innerHTML = '<div class="error-msg">Добавьте детали</div>'; return; }

    // Группируем детали по длине
    const byLength = {};
    for (const d of details) {
      if (!byLength[d.l]) byLength[d.l] = [];
      byLength[d.l].push({ ...d });
    }

    let html = '';
    let totalSheets = 0;
    let totalUsedArea = 0;
    let totalSheetArea = 0;

    const lengths = Object.keys(byLength).map(Number).sort((a, b) => a - b);

    for (const sheetLen of lengths) {
      const group = byLength[sheetLen];

      // Собираем все полосы этой длины
      const allStrips = [];
      for (const d of group) {
        for (let i = 0; i < d.c; i++) allStrips.push(d.w);
      }
      allStrips.sort((a, b) => b - a);

      // Пакуем полосы на листы по ширине (жадный)
      const sheets = [];
      for (const sw of allStrips) {
        let placed = false;
        for (const sheet of sheets) {
          if (sheet.usedW + sw <= SW) {
            sheet.strips.push(sw);
            sheet.usedW += sw;
            placed = true;
            break;
          }
        }
        if (!placed) sheets.push({ strips: [sw], usedW: sw });
      }

      // Группируем листы одинакового состава
      const groupMap = {};
      for (const sheet of sheets) {
        const key = [...sheet.strips].sort((a,b) => b-a).join('+');
        if (!groupMap[key]) groupMap[key] = { count: 0, strips: sheet.strips, usedW: sheet.usedW };
        groupMap[key].count++;
      }

      const sheetCount = sheets.length;
      totalSheets += sheetCount;
      totalSheetArea += sheetCount * SW * sheetLen;
      totalUsedArea += allStrips.reduce((s, w) => s + w * sheetLen, 0);

      html += `<div class="cut-group">
        <div class="cut-group-header">
          <span class="cut-group-sheets">${sheetCount} шт. &nbsp;1250×${sheetLen}</span>
        </div>`;

      for (const g of Object.values(groupMap)) {
        const rem = SW - g.usedW;
        const desc = [...g.strips].sort((a,b) => b-a).join(' + ');
        html += `<div class="cut-row">
          <span class="cut-row-label" style="color:var(--accent);font-weight:600;min-width:44px">${g.count} шт.</span>
          <span class="cut-row-details">${desc}${rem > 0 ? ` <span style="color:var(--muted)">+${rem}</span>` : ''}</span>
        </div>`;
      }
      html += `</div>`;
    }

    const efficiency = (totalUsedArea / totalSheetArea * 100).toFixed(1);
    const wasteM2 = ((totalSheetArea - totalUsedArea) / 1e6).toFixed(2);

    html += `<div class="summary">
      <div class="summary-title">📊 Итого</div>
      <div class="summary-row">
        <span class="summary-key">Листов всего</span>
        <span class="summary-val">${totalSheets} шт.</span>
      </div>
      <div class="summary-row">
        <span class="summary-key">Использование</span>
        <span class="summary-val" style="color:${parseFloat(efficiency)>85?'var(--success)':'var(--accent)'}">${efficiency}%</span>
      </div>
      <div class="summary-row">
        <span class="summary-key">Отходы</span>
        <span class="summary-val" style="color:var(--muted)">${wasteM2} м²</span>
      </div>
    </div>`;

    el.innerHTML = html;
  }

  // ===== АЛГОРИТМ РАСКРОЯ =====
  function mergeRemainders(strips) {
    const u = {};
    for (const s of strips) {
      if (s.width > 0 && s.height > 0) {
        const k = `${s.width}x${s.height}`;
        u[k] = u[k] || { width: s.width, height: s.height, count: 0 };
        u[k].count++;
      }
    }
    const r = [];
    for (const k in u) for (let i = 0; i < u[k].count; i++) r.push({ width: u[k].width, height: u[k].height });
    return r;
  }

  function processRemainingStrip(strip, details, cuts, detailsUsed) {
    if (!details.length || strip.width <= 0 || strip.height <= 0)
      return (strip.width > 0 && strip.height > 0) ? [strip] : [];
    const detail = details[0];
    const rest = details.slice(1);
    if (detail.width <= strip.width && detail.count > 0) {
      const count = Math.min(Math.floor(strip.height / detail.height), detail.count);
      if (count > 0) {
        const found = cuts.find(c => c.width === detail.width && c.height === detail.height);
        if (found) found.count += count; else cuts.push({ width: detail.width, height: detail.height, count });
        detail.count -= count;
        const k = `${detail.width}x${detail.height}`;
        detailsUsed[k] = (detailsUsed[k] || 0) + count;
        const usedH = count * detail.height;
        const rem = [];
        if (usedH < strip.height) rem.push(...processRemainingStrip({ width: detail.width, height: strip.height - usedH }, details.filter(d => d.count > 0), cuts, detailsUsed));
        const remW = strip.width - detail.width;
        if (remW > 0) {
          const next = details.filter(d => d.count > 0);
          if (next.length) rem.push(...processRemainingStrip({ width: remW, height: strip.height }, next, cuts, detailsUsed));
          else rem.push({ width: remW, height: strip.height });
        }
        return mergeRemainders(rem);
      } else return processRemainingStrip(strip, rest, cuts, detailsUsed);
    } else return processRemainingStrip(strip, rest, cuts, detailsUsed);
  }

  // ===== ГЕНЕРАТОР ПРОГРАММЫ ЧПУ =====
  function generateCNCProgram(cuts, sheetWidth, sheetLength) {
    const SW = sheetWidth || 1250;
    const SL = sheetLength || 99999;

    // Сначала считаем сколько полос даёт каждый cut
    const withStripCount = cuts.map(s => {
      const perStrip = (s.height > 0 && s.height < SL) ? Math.floor(SL / s.height) : 1;
      const stripCount = perStrip > 1 ? Math.ceil(s.count / perStrip) : s.count;
      return { ...s, stripCount };
    });

    const CHAIN_MIN = 3;

    // Сортируем: одиночные (stripCount < CHAIN_MIN) — первыми, Chain-группы — в конце
    // Внутри каждой группы — по ширине
    withStripCount.sort((a, b) => {
      const aChain = a.stripCount >= CHAIN_MIN ? 1 : 0;
      const bChain = b.stripCount >= CHAIN_MIN ? 1 : 0;
      if (aChain !== bChain) return aChain - bChain;
      return a.width - b.width;
    });

    const allStrips = [];
    for (const s of withStripCount) {
      for (let i = 0; i < s.stripCount; i++) allStrips.push(s.width);
    }

    const lines = [];

    if (allStrips.length === 0) {
      lines.push({ type: 'end', cmd: 'End', comment: '' });
      return buildResult(lines);
    }

    const totalWidth = allStrips.reduce((a, b) => a + b, 0);
    const hasRemainder = totalWidth < SW;

    const makeGroups = (arr) => {
      const g = []; let i = 0;
      while (i < arr.length) {
        const w = arr[i]; let cnt = 1;
        while (i + cnt < arr.length && arr[i + cnt] === w) cnt++;
        g.push({ width: w, count: cnt });
        i += cnt;
      }
      return g;
    };

    const addGroups = (groups, startPos) => {
      let pos = startPos;
      let afterChain = false;
      for (let gi = 0; gi < groups.length; gi++) {
        const g = groups[gi];
        if (g.count >= CHAIN_MIN) {
          if (pos <= 0) break;
          lines.push({ type: 'stopper', cmd: `Stopper ${pos}`, comment: 'перед Chain' });
          lines.push({ type: 'chain', cmd: `Chain ${g.width}x${g.count}`, comment: `${g.count} полос по ${g.width}` });
          pos -= g.width * g.count;
          if (pos <= 0) { afterChain = false; break; }
          afterChain = true;
        } else {
          for (let n = 0; n < g.count; n++) {
            const nextPos = pos - g.width;
            if (nextPos < 0) break;
            pos = nextPos;
            if (pos === 0) {
              // последняя полоса — только Move+Cutting, Stopper 0 недопустим
              lines.push({ type: 'move', cmd: `Move -${g.width}`, comment: `полоса ${g.width}` });
              lines.push({ type: 'cutting', cmd: 'Cutting', comment: '' });
              afterChain = false;
              break;
            }
            if (afterChain) {
              lines.push({ type: 'stopper', cmd: `Stopper ${pos}`, comment: `полоса ${g.width}` });
              lines.push({ type: 'cutting', cmd: 'Cutting', comment: '' });
              afterChain = false;
            } else {
              lines.push({ type: 'move', cmd: `Move -${g.width}`, comment: `полоса ${g.width}` });
              lines.push({ type: 'cutting', cmd: 'Cutting', comment: '' });
            }
            firstMove = false;
          }
          afterChain = false;
        }
      }
      return pos;
    };

    // ===== БЕЗ ОСТАТКА =====
    if (!hasRemainder) {
      if (allStrips.length === 1) {
        // Единственная полоса — весь лист, резать нечего
        lines.push({ type: 'end', cmd: 'End', comment: `полоса ${allStrips[0]} — весь лист` });
        return buildResult(lines);
      }

      // Первая полоса: Stopper + Cutting
      const firstW = allStrips[0];
      lines.push({ type: 'stopper', cmd: `Stopper ${SW - firstW}`, comment: `первая полоса ${firstW}` });
      lines.push({ type: 'cutting', cmd: 'Cutting', comment: '' });
      let pos = SW - firstW;

      // Все оставшиеся полосы через addGroups (включая последнюю)
      addGroups(makeGroups(allStrips.slice(1)), pos);
      lines.push({ type: 'end', cmd: 'End', comment: '' });
      return buildResult(lines);
    }

    // ===== С ОСТАТКОМ =====
    const stopper = totalWidth;
    let pos = stopper;

    lines.push({ type: 'stopper', cmd: `Stopper ${stopper}`, comment: `сумма полос ${totalWidth}` });
    lines.push({ type: 'cutting', cmd: 'Cutting', comment: 'срезаем край' });

    if (allStrips.length === 0) {
      lines.push({ type: 'end', cmd: 'End', comment: '' });
      return buildResult(lines);
    }

    // Все полосы через addGroups
    addGroups(makeGroups(allStrips), pos);
    lines.push({ type: 'end', cmd: 'End', comment: '' });
    return buildResult(lines);
  }

  function buildResult(lines) {
    const text = lines.map(l => l.cmd).join('\n');
    return { lines, text };
  }

  // ===== РАСЧЁТ РАСКРОЯ =====
  let groupCutsStore = [];

  function calculateCutting() {
    const sheets = [];
    const sheetsTable = document.getElementById('sheetsTable');
    for (let i = 1; i < sheetsTable.rows.length; i++) {
      const r = sheetsTable.rows[i];
      const w = parseInt(r.cells[0].textContent) || 0;
      const l = parseInt(r.cells[1].textContent) || 0;
      const c = parseInt(r.cells[2].textContent) || 0;
      if (w > 0 && l > 0 && c > 0)
        for (let j = 0; j < c; j++) sheets.push({ width: w, height: l });
    }

    const detailsMap = {};
    const detailsTable = document.getElementById('detailsTable');
    for (let i = 1; i < detailsTable.rows.length; i++) {
      const r = detailsTable.rows[i];
      const w = parseInt(r.cells[0].textContent) || 0;
      const l = parseInt(r.cells[1].textContent) || 0;
      const c = parseInt(r.cells[2].textContent) || 0;
      const zavalt = r.cells[3].dataset.zavalt === '1';
      if (w > 0 && l > 0 && c > 0) {
        const key = `${w}x${l}`;
        if (!detailsMap[key]) detailsMap[key] = { width: w, height: l, count: 0, zavalt };
        detailsMap[key].count += c;
      }
    }
    const details = Object.values(detailsMap);

    const el = document.getElementById('cuttingResult');
    if (!sheets.length || !details.length) {
      el.innerHTML = '<div class="error-msg">Заполните листы и детали</div>';
      return;
    }

    const cuttingGroups = [];
    const detailsUsed = {};
    const originalDetails = details.map(d => ({ ...d }));
    sheets.sort((a, b) => b.height - a.height);

    for (const sheet of sheets) {
      const cuts = [];
      let remainingWidth = sheet.width;
      let remainingStrips = [];

      const detailsLeft = originalDetails.map(d => ({
        ...d, count: Math.max(0, d.count - (detailsUsed[`${d.width}x${d.height}`] || 0))
      }));
      detailsLeft.sort((a, b) => a.height !== b.height ? b.height - a.height : b.width - a.width);

      for (const detail of detailsLeft.filter(d => d.height === sheet.height)) {
        if (detail.count <= 0) continue;
        // Номинальная ширина — приоритет. Уменьшаем только если влезает БОЛЬШЕ штук.
        // Увеличиваем только в шаге оптимизации остатка (ниже).
        let bestWidth = detail.width;
        if (detail.zavalt) {
          const nominalStrips = Math.min(Math.floor(remainingWidth / detail.width), detail.count);
          let bestStrips = nominalStrips;
          // Пробуем только уменьшение (detail.width-2 .. detail.width-1)
          for (let dw = detail.width - 2; dw < detail.width; dw++) {
            if (dw <= 0) continue;
            const s = Math.min(Math.floor(remainingWidth / dw), detail.count);
            if (s > bestStrips) { bestStrips = s; bestWidth = dw; }
          }
        }
        const strips = Math.min(Math.floor(remainingWidth / bestWidth), detail.count);
        if (strips > 0) {
          cuts.push({ width: bestWidth, height: detail.height, count: strips, nominalWidth: detail.width, zavalt: detail.zavalt });
          detail.count -= strips;
          const k = `${detail.width}x${detail.height}`;
          detailsUsed[k] = (detailsUsed[k] || 0) + strips;
          remainingWidth -= strips * bestWidth;
        }
      }

      // ===== ОПТИМИЗАЦИЯ: если до ширины листа не хватает ≤10мм — дотягиваем завальцовками =====
      // Ищем решение с минимальным количеством изменённых полос.
      // Приоритет: cut с наименьшим count (меньше полос трогаем), большая добавка d.
      const gap = remainingWidth;
      if (gap > 0 && gap <= 10) {
        const zavaltIdxs = cuts.map((c, i) => c.zavalt ? i : -1).filter(i => i >= 0);
        if (zavaltIdxs.length > 0) {
          let bestSolution = null;
          // score = [n_changed, cut_count] — меньше = лучше
          // n_changed: сколько полос меняем
          // cut_count: сколько полос в исходном cut (предпочитаем маленькие cuts)
          let bestN = Infinity, bestCutCount = Infinity;

          for (const ci of zavaltIdxs) {
            const c = cuts[ci];
            const maxAdd = c.nominalWidth + 2 - c.width;
            if (maxAdd <= 0) continue;
            // Перебираем d от maxAdd до 1
            for (let d = maxAdd; d >= 1; d--) {
              if (gap % d === 0) {
                const n = gap / d;
                if (n <= c.count) {
                  // Предпочитаем: меньше n, при равном n — меньше c.count (маленький cut)
                  if (n < bestN || (n === bestN && c.count < bestCutCount)) {
                    bestN = n; bestCutCount = c.count;
                    bestSolution = { ci, n, d };
                  }
                }
              }
            }
          }

          // Если не нашли точного деления — перебор всех комбинаций n*d
          if (!bestSolution) {
            for (const ci of zavaltIdxs) {
              const c = cuts[ci];
              const maxAdd = c.nominalWidth + 2 - c.width;
              if (maxAdd <= 0) continue;
              for (let n = 1; n <= Math.min(c.count, gap); n++) {
                for (let d = maxAdd; d >= 1; d--) {
                  if (n * d === gap) {
                    if (n < bestN || (n === bestN && c.count < bestCutCount)) {
                      bestN = n; bestCutCount = c.count;
                      bestSolution = { ci, n, d };
                    }
                  }
                }
              }
            }
          }

          // Применяем решение
          if (bestSolution) {
            const { ci, n, d } = bestSolution;
            const c = cuts[ci];
            if (n === c.count) {
              c.width += d;
            } else {
              const newCut = { ...c, count: n, width: c.width + d };
              c.count -= n;
              cuts.splice(ci + 1, 0, newCut);
            }
            remainingWidth = sheet.width - cuts.reduce((s, c) => s + c.width * c.count, 0);
            if (remainingWidth < 0) remainingWidth = 0;
          }
        }
      }

      if (remainingWidth > 0) remainingStrips.push({ width: remainingWidth, height: sheet.height });

      const shortDetails = detailsLeft.filter(d => d.height < sheet.height && d.count > 0);
      let newStrips = [];
      for (const strip of remainingStrips)
        newStrips.push(...processRemainingStrip(strip, shortDetails, cuts, detailsUsed));
      remainingStrips = newStrips;

      const rem = {};
      for (const s of remainingStrips)
        if (s.width > 0 && s.height > 0) { const k = `${s.width}x${s.height}`; rem[k] = (rem[k] || 0) + 1; }

      const restParts = Object.entries(rem).map(([sz, cnt]) => `${sz} ×${cnt}`);
      cuttingGroups.push({ cuts: cuts.map(c => ({ ...c })), rest: restParts.join(', ') || '—', length: sheet.height, width: sheet.width });
    }

    const groups = {};
    for (const g of cuttingGroups) {
      const cutsStr = g.cuts.map(d => {
        const perStrip = Math.floor(g.length / d.height);
        const widthLabel = (d.zavalt && d.nominalWidth && d.width !== d.nominalWidth)
          ? `${d.width}(${d.nominalWidth > d.width ? '-' : '+'}${Math.abs(d.nominalWidth - d.width)})` 
          : `${d.width}`;
        return perStrip > 1 ? `${widthLabel}×${d.height} ×${d.count} (${perStrip}/пол.)` : `${widthLabel}×${d.height} ×${d.count}`;
      }).join(', ') || '—';
      const key = cutsStr + '|' + g.rest;
      if (!groups[key]) {
        groups[key] = { count: 0, cuts: cutsStr, rest: g.rest, length: g.length, width: g.width, cutsData: g.cuts };
      }
      groups[key].count++;
    }

    groupCutsStore = [];
    let gIdx = 0;

    let html = `<table class="result-table">
      <tr><th>Листы</th><th>Раскрой</th><th>Остаток / Программа</th></tr>`;

    for (const key in groups) {
      const g = groups[key];
      const label = g.count === 1 ? `1 × ${g.length}` : `${g.count} × ${g.length}`;
      const storeIdx = gIdx++;
      groupCutsStore.push({ cuts: g.cutsData, label: g.length, width: g.width, length: g.length });

      html += `<tr>
        <td><span class="sheet-label">${label}</span></td>
        <td class="cuts-text">${g.cuts}</td>
        <td>
          <div class="rest-text" style="margin-bottom:8px">${g.rest}</div>
          <button class="btn-prog" onclick="openModal(groupCutsStore[${storeIdx}].cuts, groupCutsStore[${storeIdx}].label, groupCutsStore[${storeIdx}].width, groupCutsStore[${storeIdx}].length)">⚙ прогр.</button>
        </td>
      </tr>`;
    }
    html += '</table>';

    html += `<div class="summary"><div class="summary-title">📊 Итого</div>`;
    for (const d of originalDetails) {
      const used = detailsUsed[`${d.width}x${d.height}`] || 0;
      const missing = d.count - used;
      html += `<div class="summary-row">
        <span class="summary-key">${d.width}×${d.height}</span>
        <span>
          <span class="summary-val">размещено ${used} из ${d.count}</span>
          ${missing > 0 ? `<span class="summary-err"> (не хватило: ${missing})</span>` : ''}
        </span>
      </div>`;
    }
    html += '</div>';

    el.innerHTML = html;
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    saveToHistory(); // сохраняем в историю после успешного раскроя
  }

  // ===== ОЧИСТИТЬ ВСЁ =====
  function clearAll() {
    const sheetsTable = document.getElementById('sheetsTable');
    while (sheetsTable.rows.length > 1) sheetsTable.deleteRow(1);

    document.getElementById('sheetWidthInput').value = '1250';
    document.getElementById('sheetLengthInput').value = '';
    document.getElementById('sheetCountInput').value = '';

    const detailsTable = document.getElementById('detailsTable');
    while (detailsTable.rows.length > 1) detailsTable.deleteRow(1);

    document.getElementById('detailWidthInput').value = '';
    document.getElementById('detailLengthInput').value = '';
    document.getElementById('detailCountInput').value = '';

    document.getElementById('cuttingResult').innerHTML = '';

    saveState();
    showToast('Очищено ✓');
  }

  // ===== ЛОКАЛЬНОЕ ХРАНИЛИЩЕ =====
  function getState() {
    const sheets = [];
    const sheetsTable = document.getElementById('sheetsTable');
    for (let i = 1; i < sheetsTable.rows.length; i++) {
      const r = sheetsTable.rows[i];
      sheets.push({ w: r.cells[0].textContent, l: r.cells[1].textContent, c: r.cells[2].textContent });
    }
    const details = [];
    const detailsTable = document.getElementById('detailsTable');
    for (let i = 1; i < detailsTable.rows.length; i++) {
      const r = detailsTable.rows[i];
      details.push({ w: r.cells[0].textContent, l: r.cells[1].textContent, c: r.cells[2].textContent, z: r.cells[3].dataset.zavalt });
    }
    return { sheets, details };
  }

  function saveState() {
    try {
      const state = getState();
      localStorage.setItem('mc_current', JSON.stringify(state));
    } catch(e) {}
  }

  function loadState(state) {
    // Очищаем таблицы
    const sheetsTable = document.getElementById('sheetsTable');
    while (sheetsTable.rows.length > 1) sheetsTable.deleteRow(1);
    const detailsTable = document.getElementById('detailsTable');
    while (detailsTable.rows.length > 1) detailsTable.deleteRow(1);

    // Листы
    for (const s of state.sheets) {
      const row = sheetsTable.insertRow();
      [s.w, s.l, s.c].forEach(v => { row.insertCell().textContent = v; });
      const td = row.insertCell();
      const btn = document.createElement('button');
      btn.textContent = '✕'; btn.className = 'icon-btn';
      btn.onclick = () => { sheetsTable.deleteRow(row.rowIndex); saveState(); };
      td.appendChild(btn);
    }

    // Детали
    for (const d of state.details) {
      const row = detailsTable.insertRow();
      [d.w, d.l, d.c].forEach(v => { row.insertCell().textContent = v; });
      const ztd = row.insertCell();
      const isZavalt = d.z === '1';
      ztd.textContent = isZavalt ? '±2' : '—';
      ztd.style.color = isZavalt ? 'var(--accent)' : 'var(--muted)';
      ztd.dataset.zavalt = d.z;
      const td = row.insertCell();
      const btn = document.createElement('button');
      btn.textContent = '✕'; btn.className = 'icon-btn';
      btn.onclick = () => { detailsTable.deleteRow(row.rowIndex); saveState(); };
      td.appendChild(btn);
    }
  }

  function restoreState() {
    try {
      const raw = localStorage.getItem('mc_current');
      if (raw) { loadState(JSON.parse(raw)); }
    } catch(e) {}
  }

  // Автосохранение при добавлении/удалении — патчим кнопки удаления через MutationObserver
  function hookAutoSave() {
    ['sheetsTable','detailsTable'].forEach(id => {
      new MutationObserver(() => saveState())
        .observe(document.getElementById(id), { childList: true, subtree: true });
    });
  }

  // ===== ИСТОРИЯ =====
  function saveToHistory() {
    try {
      const state = getState();
      if (!state.sheets.length && !state.details.length) return;
      const history = getHistory();
      const entry = { state, date: new Date().toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }) };
      // Не дублируем одинаковые наборы
      const sig = JSON.stringify(state);
      const exists = history.find(h => JSON.stringify(h.state) === sig);
      if (exists) return;
      history.unshift(entry);
      if (history.length > 5) history.pop();
      localStorage.setItem('mc_history', JSON.stringify(history));
    } catch(e) {}
  }

  function getHistory() {
    try { return JSON.parse(localStorage.getItem('mc_history') || '[]'); } catch(e) { return []; }
  }

  function openHistory() {
    const history = getHistory();
    const body = document.getElementById('historyBody');
    if (!history.length) {
      body.innerHTML = '<div class="history-empty">История пуста</div>';
    } else {
      body.innerHTML = history.map((h, i) => {
        const sheets = h.state.sheets.map(s => `${s.w}×${s.l} ×${s.c}`).join(', ');
        const details = h.state.details.map(d => `${d.w}×${d.l} ×${d.c}${d.z==='1'?' ±2':''}`).join(', ');
        return `<div class="history-item" onclick="loadFromHistory(${i})">
          <button class="history-item-del" onclick="deleteHistory(event,${i})">✕</button>
          <div class="history-item-date">${h.date}</div>
          <div class="history-item-sheets">📋 ${sheets || '—'}</div>
          <div class="history-item-details">🔩 ${details || '—'}</div>
        </div>`;
      }).join('');
    }
    document.getElementById('historyModal').classList.add('open');
  }

  function closeHistory() { document.getElementById('historyModal').classList.remove('open'); }
  function closeHistoryOutside(e) { if (e.target === document.getElementById('historyModal')) closeHistory(); }

  function loadFromHistory(i) {
    const history = getHistory();
    if (history[i]) {
      loadState(history[i].state);
      document.getElementById('cuttingResult').innerHTML = '';
      closeHistory();
      showToast('Загружено ✓');
    }
  }

  function deleteHistory(e, i) {
    e.stopPropagation();
    const history = getHistory();
    history.splice(i, 1);
    localStorage.setItem('mc_history', JSON.stringify(history));
    openHistory(); // обновить список
  }
</script>

<!-- ИСТОРИЯ -->

<div class="history-modal" id="historyModal" onclick="closeHistoryOutside(event)">
  <div class="history-box">
    <div class="history-header">
      <span class="history-title">📂 История</span>
      <button class="modal-close" onclick="closeHistory()">✕</button>
    </div>
    <div class="history-body" id="historyBody"></div>
  </div>
</div>

</body>
</html>
